<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Grid</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>
    <div class="container">
        <h1>Pixel Grid</h1>
        <div class="controls">
            <label for="gridSize">グリッドサイズ: <span id="gridSizeLabel">8</span>x<span id="gridSizeLabel2">8</span></label>
            <div class="slider-container">
                <button id="decrementBtn" class="stepper-btn">-</button>
                <input type="range" id="gridSize" min="1" max="64" value="8">
                <button id="incrementBtn" class="stepper-btn">+</button>
            </div>
            <div class="action-buttons">
                <button id="saveButton">PNGとして保存</button>
                <button id="clearButton">クリア</button>
            </div>
        </div>
        <canvas id="gridCanvas" width="640" height="640"></canvas>
    </div>

    <div id="confirmClearModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p>本当にキャンバスをクリアしますか？</p>
            <div class="modal-actions">
                <button id="confirmClearBtn">はい、クリアします</button>
                <button id="cancelClearBtn">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="confirmResizeModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p>サイズを変更すると描画内容はクリアされます。<br>よろしいですか？</p>
            <div class="modal-actions">
                <button id="confirmResizeBtn">はい、変更します</button>
                <button id="cancelResizeBtn">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="saveErrorModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p>PNGの保存に失敗しました。</p>
            <div class="modal-actions">
                <button id="closeErrorBtn">閉じる</button>
            </div>
        </div>
    </div>

    <a 
            id="github-link"
            href="https://github.com/black-sesame-ice-cream/Pixel-Grid" 
            target="_blank" 
            rel="noopener noreferrer"
            title="View on GitHub">
        
            <i class="fa-brands fa-github"></i>
    
        </a>

    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
