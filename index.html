<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グリッド・ジェネレーター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>グリッド・ジェネレーター</h1>
        <div class="controls">
            <label for="gridSize">グリッドサイズ: <span id="gridSizeLabel">8</span>x<span id="gridSizeLabel2">8</span></label>
            <div class="slider-container">
                <button id="decrementBtn" class="stepper-btn">-</button>
                <input type="range" id="gridSize" min="1" max="64" value="8">
                <button id="incrementBtn" class="stepper-btn">+</button>
            </div>
            <div class="action-buttons">
                <button id="saveButton">PNGとして保存</button>
                <button id="clearButton">クリア</button>
            </div>
        </div>
        <canvas id="gridCanvas" width="640" height="640"></canvas>
    </div>

    <div id="confirmClearModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p>本当にキャンバスをクリアしますか？</p>
            <div class="modal-actions">
                <button id="confirmClearBtn">はい、クリアします</button>
                <button id="cancelClearBtn">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="confirmResizeModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p>サイズを変更すると描画内容はクリアされます。<br>よろしいですか？</p>
            <div class="modal-actions">
                <button id="confirmResizeBtn">はい、変更します</button>
                <button id="cancelResizeBtn">キャンセル</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
